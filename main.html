<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Buy Treats | Get Cashback</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #0d9488;
      --primary-light: #14b8a6;
      --primary-dark: #0f766e;
      --neon-blue: #00d4ff;
      --neon-blue-light: #8ae2ff;
      --background-start: #d4f1ff;
      --background-end: #b0e6ff;
      --card-bg: rgba(255, 255, 255, 0.92);
      --text-main: #0f172a;
      --text-muted: #475569;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, var(--background-start), var(--background-end));
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 1.2rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(circle at 15% 25%, rgba(0, 212, 255, 0.25) 0%, transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(0, 212, 255, 0.2) 0%, transparent 45%),
        radial-gradient(circle at 50% 80%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 20% 70%, rgba(255, 255, 255, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 75% 60%, rgba(0, 212, 255, 0.15) 0%, transparent 45%);
      pointer-events: none;
      z-index: 0;
      filter: blur(6px);
    }

    .decoration {
      position: absolute;
      pointer-events: none;
      z-index: 0;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.08));
    }

    .decoration.tree {
      bottom: 5%;
      left: 4%;
      font-size: 3.5rem;
      opacity: 0.25;
      animation: float-slow 6s ease-in-out infinite;
    }

    .decoration.star {
      top: 6%;
      right: 8%;
      font-size: 2rem;
      opacity: 0.3;
      animation: twinkle 2s ease-in-out infinite;
    }

    .decoration.gift {
      bottom: 10%;
      right: 6%;
      font-size: 2.5rem;
      opacity: 0.2;
      animation: float-slow 5s ease-in-out infinite 1s;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.1); }
    }

    @keyframes float-slow {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(-2deg); }
    }

    .snowflake {
      position: absolute;
      color: rgba(255, 255, 255, 0.5);
      font-size: 1rem;
      pointer-events: none;
      z-index: 0;
      animation: fall linear infinite;
      text-shadow: 0 0 5px rgba(255,255,255,0.3);
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .main-card {
      max-width: 440px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 32px;
      box-shadow: 
        0 20px 50px rgba(0, 0, 0, 0.06), 
        inset 0 1px 1px rgba(255, 255, 255, 0.8),
        0 0 0 1px rgba(255, 255, 255, 0.3);
      padding: 2.4rem 1.8rem 2.6rem;
      position: relative;
      z-index: 1;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .main-card:hover {
      transform: translateY(-3px);
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--primary);
      text-transform: uppercase;
      background: rgba(13, 148, 136, 0.08);
      padding: 0.3rem 1.2rem;
      border-radius: 60px;
      border: 1px solid rgba(13, 148, 136, 0.1);
      margin: 0 auto 0.8rem;
      width: fit-content;
    }
    
    .brand-badge i {
      color: #FFD700;
    }

    .dashboard-header {
      text-align: center;
      margin-bottom: 1.4rem;
    }

    .dashboard-header h1 {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--text-main);
      line-height: 1.2;
    }

    .dashboard-header h1 .highlight {
      background: linear-gradient(to right, #0d9488, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .dashboard-header .sub {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    .profile-section {
      display: flex;
      align-items: flex-start;
      gap: 1.2rem;
      margin-bottom: 1.8rem;
      padding: 0.5rem 0;
    }

    .profile-photo-container {
      position: relative;
      flex-shrink: 0;
    }

    .profile-photo-wrapper {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: visible;
      cursor: pointer;
    }

    .profile-photo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #ffffff;
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.25);
      background: linear-gradient(135deg, #0d9488, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }

    .profile-photo:hover {
      transform: scale(1.03);
    }

    .profile-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .profile-photo-wrapper .projector-zoom {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid rgba(255, 215, 0, 0.5);
      box-shadow: 
        0 0 30px rgba(255, 215, 0, 0.2),
        0 0 60px rgba(0, 212, 255, 0.15),
        inset 0 0 30px rgba(255, 215, 0, 0.05);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(4px);
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile-photo-wrapper .projector-zoom img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .profile-photo-wrapper .projector-zoom::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent 0%, rgba(255, 215, 0, 0.06) 10%, transparent 20%, rgba(0, 212, 255, 0.06) 30%, transparent 40%, rgba(255, 215, 0, 0.06) 50%, transparent 60%, rgba(0, 212, 255, 0.06) 70%, transparent 80%, rgba(255, 215, 0, 0.06) 90%, transparent 100%);
      animation: projector-spin 8s linear infinite;
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
    }

    @keyframes projector-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .profile-photo-wrapper:hover .projector-zoom,
    .profile-photo-wrapper.active .projector-zoom {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .profile-photo-wrapper:hover .profile-photo img,
    .profile-photo-wrapper.active .profile-photo img {
      transform: scale(1.25);
    }

    .profile-photo-wrapper:hover .profile-photo,
    .profile-photo-wrapper.active .profile-photo {
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3), 0 0 0 2px rgba(255, 215, 0, 0.3);
    }

    @media (hover: none) {
      .profile-photo-wrapper .projector-zoom {
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .profile-photo-wrapper.active .projector-zoom {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      .profile-photo-wrapper.active .profile-photo img {
        transform: scale(1.25);
      }
      .profile-photo-wrapper.active .profile-photo {
        box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3), 0 0 0 2px rgba(255, 215, 0, 0.3);
      }
    }

    .status-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      background: #10b981;
      border: 2.5px solid #ffffff;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
      animation: pulse-dot 2s ease-in-out infinite;
      z-index: 10;
    }

    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.7; }
    }

    .thought-bubble-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      min-height: 70px;
    }

    .thought-bubble {
      background: #f8fafc;
      border-radius: 18px 18px 18px 6px;
      padding: 1rem 1.2rem;
      width: 100%;
      min-height: 62px;
      display: flex;
      align-items: center;
      border: 1px solid rgba(0,0,0,0.04);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.02);
      position: relative;
    }

    .thought-bubble::before {
      content: '';
      position: absolute;
      left: -10px;
      top: 24px;
      width: 0;
      height: 0;
      border-right: 12px solid #f8fafc;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      filter: drop-shadow(-1px 0 1px rgba(0, 0, 0, 0.01));
    }

    .thought-bubble::after {
      content: '';
      position: absolute;
      left: -12px;
      top: 22px;
      width: 0;
      height: 0;
      border-right: 14px solid rgba(0,0,0,0.04);
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      z-index: 0;
      opacity: 0.3;
    }

    .thought-bubble .message-content {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-main);
      line-height: 1.5;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: #0d9488;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Dashboard Balance */
    .dashboard-section {
      background: linear-gradient(145deg, #00d4ff, #00b8e6);
      border-radius: 20px;
      padding: 1.6rem 1.8rem;
      margin-bottom: 1.2rem;
      box-shadow: 0 8px 30px rgba(0, 212, 255, 0.25);
      position: relative;
      overflow: hidden;
    }

    .dashboard-section::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -30px;
      width: 150px;
      height: 150px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      pointer-events: none;
    }

    .dashboard-section::after {
      content: '';
      position: absolute;
      bottom: -30px;
      left: -20px;
      width: 100px;
      height: 100px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      pointer-events: none;
    }

    .balance-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .balance-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.85);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .claim-btn {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 30px;
      padding: 0.4rem 1rem;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.65rem;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .claim-btn:hover {
      background: rgba(255, 255, 255, 0.35);
      transform: scale(1.05);
    }

    .claim-btn:active {
      transform: scale(0.95);
    }

    .claim-btn .gcash-icon-small {
      width: 20px;
      height: 20px;
      object-fit: contain;
      display: block;
    }

    .balance-amount {
      font-size: 2.8rem;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -0.02em;
      display: flex;
      align-items: baseline;
      gap: 4px;
      margin-top: 2px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: all 0.3s ease;
    }

    .balance-amount .peso-sign {
      font-size: 1.8rem;
      font-weight: 700;
      opacity: 0.9;
    }

    .balance-amount .amount-change {
      display: inline-block;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .balance-amount .amount-change.increment {
      animation: incrementPop 0.6s ease;
    }

    .balance-amount .amount-change.decrement {
      animation: decrementPop 0.6s ease;
    }

    @keyframes incrementPop {
      0% { transform: scale(1); color: #ffffff; }
      30% { transform: scale(1.3); color: #fcd34d; }
      70% { transform: scale(1.1); color: #fcd34d; }
      100% { transform: scale(1); color: #ffffff; }
    }

    @keyframes decrementPop {
      0% { transform: scale(1); color: #ffffff; }
      30% { transform: scale(0.8); color: #fca5a5; }
      70% { transform: scale(0.9); color: #fca5a5; }
      100% { transform: scale(1); color: #ffffff; }
    }

    .balance-sub {
      font-size: 0.65rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 4px;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .balance-sub i {
      color: #fcd34d;
    }

    /* ===== TWO SIDE-BY-SIDE CARDS ===== */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }

    .card-item {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease;
      aspect-ratio: 1 / 1.15;
      background: #f8fafc;
      border: 2px solid transparent;
    }

    .card-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
    }

    .card-item.selected {
      border-color: var(--neon-blue);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.25);
    }

    .card-item .card-image-wrapper {
      width: 100%;
      height: 100%;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card-item .card-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .card-item .card-image-wrapper:hover img {
      transform: scale(1.05);
    }

    .card-item .card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.6rem 0.6rem 0.8rem;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.6) 0%, transparent 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      z-index: 15;
      pointer-events: none;
    }

    .card-item .card-overlay .card-label {
      color: #ffffff;
      font-weight: 700;
      font-size: 0.55rem;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      opacity: 0.7;
    }

    .card-item .card-overlay .card-label i {
      margin-right: 4px;
      color: #fcd34d;
    }

    .card-item .card-overlay .prize-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #ffffff;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .card-item .card-overlay .prize-display .old-price {
      font-size: 0.6rem;
      text-decoration: line-through;
      opacity: 0.5;
      color: #fca5a5;
    }

    .card-item .card-overlay .prize-display .new-price {
      font-size: 0.9rem;
      font-weight: 800;
      color: #fcd34d;
    }

    .card-item .card-overlay .prize-display .new-price .peso {
      font-size: 0.65rem;
    }

    .card-item .card-btn {
      background: var(--neon-blue);
      border: none;
      border-radius: 30px;
      padding: 0.3rem 0.8rem;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.55rem;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
      display: flex;
      align-items: center;
      gap: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      width: 100%;
      justify-content: center;
      margin-top: 2px;
      pointer-events: auto;
      position: relative;
      z-index: 20;
    }

    .card-item .card-btn:hover {
      background: #00b8e6;
      box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
    }

    .card-item .card-btn:active {
      transform: scale(0.95);
    }

    .card-item .card-btn.selected-btn {
      background: #94a3b8;
      box-shadow: none;
    }

    .card-item .card-btn.selected-btn:hover {
      background: #94a3b8;
      box-shadow: none;
    }

    .card-item .card-btn i {
      font-size: 0.6rem;
    }

    .card-item .card-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(255, 215, 0, 0.9);
      color: #0f172a;
      font-size: 0.5rem;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      z-index: 20;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      pointer-events: none;
    }

    .card-item .card-badge i {
      margin-right: 3px;
    }

    .card-item.selected .card-badge {
      background: var(--neon-blue);
      color: #ffffff;
    }

    .card-item .discount-tag {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(239, 68, 68, 0.9);
      color: #ffffff;
      font-size: 0.5rem;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      z-index: 20;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      pointer-events: none;
    }

    .card-item .discount-tag i {
      margin-right: 3px;
    }

    .card-item.selected .discount-tag {
      background: var(--neon-blue);
    }

    /* ===== FUTURISTIC FINANCE POPUP ===== */
    .popup-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(4, 16, 36, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      animation: fadeIn 0.3s ease;
    }

    .popup-overlay.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .popup-content {
      max-width: 420px;
      width: 100%;
      background: linear-gradient(145deg, #0a1a3a, #0d2b5e);
      border-radius: 32px;
      padding: 2rem 1.8rem 2.2rem;
      position: relative;
      box-shadow: 
        0 30px 80px rgba(0, 0, 0, 0.5),
        0 0 40px rgba(0, 212, 255, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.1);
      animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }

    .popup-content::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(0, 212, 255, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0, 212, 255, 0.03) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    /* Holographic connection lines */
    .popup-content::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        linear-gradient(90deg, transparent 0%, rgba(0, 212, 255, 0.02) 20%, transparent 40%, rgba(0, 212, 255, 0.02) 60%, transparent 80%, rgba(0, 212, 255, 0.02) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .popup-content > * {
      position: relative;
      z-index: 1;
    }

    .popup-close {
      position: absolute;
      top: 14px;
      right: 16px;
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.6);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .popup-close:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.3);
      color: #ffffff;
      transform: rotate(90deg);
    }

    .popup-close:active {
      transform: rotate(90deg) scale(0.9);
    }

    .popup-image-wrapper {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 1.2rem;
      box-shadow: 
        0 8px 30px rgba(0, 0, 0, 0.3),
        0 0 40px rgba(0, 212, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.08);
    }

    .popup-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .popup-badge-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }

    .popup-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 215, 0, 0.1);
      color: #ffd700;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.3rem 0.8rem;
      border-radius: 30px;
      border: 1px solid rgba(255, 215, 0, 0.1);
    }

    .popup-badge i {
      font-size: 0.7rem;
    }

    .popup-discount {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.3rem 0.8rem;
      border-radius: 30px;
      border: 1px solid rgba(239, 68, 68, 0.1);
    }

    .popup-price-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 0.6rem;
    }

    .popup-price-row .old-price {
      font-size: 0.85rem;
      text-decoration: line-through;
      color: rgba(255, 255, 255, 0.35);
      font-weight: 600;
    }

    .popup-price-row .new-price {
      font-size: 2rem;
      font-weight: 900;
      color: #ffd700;
    }

    .popup-price-row .new-price .peso {
      font-size: 1.2rem;
    }

    .popup-label {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.8rem;
    }

    .popup-btn-select {
      width: 100%;
      background: linear-gradient(145deg, #00d4ff, #0099cc);
      border: none;
      border-radius: 16px;
      padding: 1rem 0.5rem;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 0.5rem;
    }

    .popup-btn-select:hover {
      background: linear-gradient(145deg, #00e5ff, #00aadd);
      box-shadow: 0 0 50px rgba(0, 212, 255, 0.3);
      transform: scale(1.02);
    }

    .popup-btn-select:active {
      transform: scale(0.96);
    }

    .popup-btn-select i {
      color: #fcd34d;
    }

    .popup-btn-select.selected-popup {
      background: linear-gradient(145deg, #4a5568, #2d3748);
      box-shadow: none;
    }

    .popup-btn-select.selected-popup:hover {
      background: linear-gradient(145deg, #4a5568, #2d3748);
      transform: none;
      box-shadow: none;
    }

    .popup-btn-select.selected-popup i {
      color: #a0aec0;
    }

    @keyframes slideUp {
      from { transform: translateY(30px) scale(0.96); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* Footer */
    .brand-footer {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--text-muted);
      opacity: 0.4;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .brand-footer i {
      color: #0d9488;
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 480px) {
      body { padding: 0.8rem; }
      .main-card { padding: 1.6rem 1.2rem 2rem; border-radius: 24px; }
      
      .profile-photo-wrapper { width: 70px; height: 70px; }
      .profile-photo { width: 70px; height: 70px; }
      .profile-photo-wrapper .projector-zoom { width: 150px; height: 150px; }
      
      .thought-bubble { padding: 0.8rem 1rem; min-height: 54px; }
      .thought-bubble .message-content { font-size: 0.8rem; }
      .thought-bubble::before { top: 20px; }
      .thought-bubble::after { top: 18px; }
      
      .dashboard-header h1 { font-size: 1.3rem; }
      
      .balance-amount { font-size: 2.2rem; }
      .balance-amount .peso-sign { font-size: 1.4rem; }
      
      .dashboard-section { padding: 1.2rem 1.4rem; }
      
      .cards-grid { gap: 0.6rem; }
      .card-item .card-label { font-size: 0.5rem; }
      .card-item .card-btn { font-size: 0.5rem; padding: 0.25rem 0.5rem; }
      .card-item .card-badge { font-size: 0.45rem; padding: 1px 6px; }
      .card-item .discount-tag { font-size: 0.45rem; padding: 1px 6px; }
      .card-item .prize-display .old-price { font-size: 0.5rem; }
      .card-item .prize-display .new-price { font-size: 0.75rem; }
      .claim-btn { font-size: 0.55rem; padding: 0.3rem 0.8rem; }
      .claim-btn .gcash-icon-small { width: 16px; height: 16px; }
      
      .popup-content { padding: 1.5rem 1.2rem 1.8rem; }
      .popup-price-row .new-price { font-size: 1.6rem; }
      .popup-btn-select { font-size: 0.85rem; padding: 0.8rem 0.5rem; }
      
      .decoration { display: none; }
    }

    @media (max-width: 380px) {
      .main-card { padding: 1.2rem 0.9rem 1.6rem; }
      .profile-photo-wrapper { width: 60px; height: 60px; }
      .profile-photo { width: 60px; height: 60px; }
      .profile-photo-wrapper .projector-zoom { width: 130px; height: 130px; }
      .thought-bubble .message-content { font-size: 0.72rem; }
      .thought-bubble { min-height: 46px; padding: 0.5rem 0.8rem; }
      .balance-amount { font-size: 1.8rem; }
      .popup-content { padding: 1.2rem 1rem 1.5rem; }
      .popup-price-row .new-price { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <div class="decoration tree">🎄</div>
  <div class="decoration star">⭐</div>
  <div class="decoration gift">🎁</div>

  <div class="snowflake" style="left: 5%; animation-duration: 12s; animation-delay: 0s;">❄</div>
  <div class="snowflake" style="left: 15%; animation-duration: 14s; animation-delay: 2s;">❄</div>
  <div class="snowflake" style="left: 25%; animation-duration: 10s; animation-delay: 4s;">❄</div>
  <div class="snowflake" style="left: 35%; animation-duration: 16s; animation-delay: 1s;">❄</div>
  <div class="snowflake" style="left: 45%; animation-duration: 11s; animation-delay: 3s;">❄</div>
  <div class="snowflake" style="left: 55%; animation-duration: 13s; animation-delay: 5s;">❄</div>
  <div class="snowflake" style="left: 65%; animation-duration: 15s; animation-delay: 2s;">❄</div>
  <div class="snowflake" style="left: 75%; animation-duration: 12s; animation-delay: 4s;">❄</div>
  <div class="snowflake" style="left: 85%; animation-duration: 14s; animation-delay: 1s;">❄</div>
  <div class="snowflake" style="left: 92%; animation-duration: 11s; animation-delay: 3s;">❄</div>

  <div class="main-card">
    
    <div style="display: flex; justify-content: center;">
      <div class="brand-badge">
        <i class="fas fa-gift"></i> BUY TREATS · CASHBACK
      </div>
    </div>

    <div class="dashboard-header">
      <h1>
        <span class="highlight">✨ Holiday</span> Dashboard
      </h1>
      <div class="sub">
        <i class="fas fa-calendar-alt"></i> Merry Christmas! 🎄
      </div>
    </div>

    <div class="profile-section">
      <div class="profile-photo-container">
        <div class="profile-photo-wrapper" id="photoWrapper">
          <div class="profile-photo">
            <img src="photos/iva2.png" alt="Profile" id="profileImg" />
          </div>
          <div class="projector-zoom" id="projectorZoom">
            <img src="photos/iva2.png" alt="Zoom" id="projectorImg" />
          </div>
        </div>
        <div class="status-dot"></div>
      </div>

      <div class="thought-bubble-wrapper">
        <div class="thought-bubble">
          <div class="message-content">
            <span id="typedText"></span><span class="cursor"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Dashboard Balance with Claim Now Button -->
    <div class="dashboard-section">
      <div class="balance-header">
        <div class="balance-label">
          <i class="fas fa-wallet"></i> Available Balance
        </div>
        <button class="claim-btn" id="claimNowBtn">
          <img src="photos/gc_icon.png" alt="GCash" class="gcash-icon-small" />
          Claim Now
        </button>
      </div>
      <div class="balance-amount">
        <span class="peso-sign">₱</span> 
        <span class="amount-change" id="balanceAmount">0.00</span>
      </div>
      <div class="balance-sub">
        <i class="fas fa-arrow-up"></i> Updated just now
      </div>
    </div>

    <!-- Two Side-by-Side Cards -->
    <div class="cards-grid">
      <!-- Card 1: 1500 -->
      <div class="card-item" id="card1" data-amount="1500.00">
        <div class="card-image-wrapper" onclick="openPopup(1)">
          <img src="photos/1500iva.png" alt="Reward 1500" />
        </div>
        <span class="card-badge"><i class="fas fa-star"></i> ₱1,500</span>
        <span class="discount-tag"><i class="fas fa-tag"></i> -22%</span>
        <div class="card-overlay">
          <span class="card-label"><i class="fas fa-gift"></i> Treat Reward</span>
          <div class="prize-display">
            <span class="old-price">₱700</span>
            <span class="new-price"><span class="peso">₱</span>545</span>
          </div>
          <button class="card-btn" onclick="event.stopPropagation(); selectCard(1)">Select Treat</button>
        </div>
      </div>

      <!-- Card 2: 3000 -->
      <div class="card-item" id="card2" data-amount="3000.00">
        <div class="card-image-wrapper" onclick="openPopup(2)">
          <img src="photos/3000iva.png" alt="Reward 3000" />
        </div>
        <span class="card-badge"><i class="fas fa-star"></i> ₱3,000</span>
        <span class="discount-tag"><i class="fas fa-tag"></i> -28%</span>
        <div class="card-overlay">
          <span class="card-label"><i class="fas fa-gift"></i> Treat Reward</span>
          <div class="prize-display">
            <span class="old-price">₱1,500</span>
            <span class="new-price"><span class="peso">₱</span>1,080</span>
          </div>
          <button class="card-btn" onclick="event.stopPropagation(); selectCard(2)">Select Treat</button>
        </div>
      </div>
    </div>

    <div class="brand-footer">
      <i class="fas fa-gem"></i> Buy Treats | Get Cashback · Premium
    </div>
  </div>

  <!-- ===== FUTURISTIC FINANCE POPUP ===== -->
  <div class="popup-overlay" id="popupOverlay" onclick="if(event.target===this) closePopup()">
    <div class="popup-content">
      <button class="popup-close" onclick="closePopup()">
        <i class="fas fa-times"></i>
      </button>
      
      <div class="popup-image-wrapper">
        <img src="" alt="Reward" id="popupImage" />
      </div>
      
      <div class="popup-badge-row">
        <span class="popup-badge"><i class="fas fa-star"></i> <span id="popupBadge">₱1,500</span></span>
        <span class="popup-discount" id="popupDiscount">-22%</span>
      </div>
      
      <div class="popup-price-row">
        <span class="old-price" id="popupOldPrice">₱700</span>
        <span class="new-price"><span class="peso">₱</span><span id="popupNewPrice">545</span></span>
      </div>
      
      <div class="popup-label"><i class="fas fa-gift"></i> Treat Reward</div>
      
      <button class="popup-btn-select" id="popupSelectBtn" onclick="popupSelectCard()">
        <i class="fas fa-check-circle"></i> Select Treat
      </button>
    </div>
  </div>

  <script>
    (function() {
      // ---- IMAGE ERROR HANDLING ----
      const profileImg = document.getElementById('profileImg');
      const projectorImg = document.getElementById('projectorImg');

      profileImg.addEventListener('error', function() {
        this.style.display = 'none';
        this.parentElement.style.background = 'linear-gradient(135deg, #0d9488, #06b6d4)';
        this.parentElement.style.display = 'flex';
        this.parentElement.style.alignItems = 'center';
        this.parentElement.style.justifyContent = 'center';
        const placeholder = document.createElement('span');
        placeholder.textContent = '👤';
        placeholder.style.fontSize = '2.5rem';
        placeholder.style.color = '#ffffff';
        placeholder.style.opacity = '0.6';
        this.parentElement.appendChild(placeholder);
      });

      projectorImg.addEventListener('error', function() {
        this.style.display = 'none';
        this.parentElement.style.background = 'linear-gradient(135deg, #0d9488, #06b6d4)';
        this.parentElement.style.display = 'flex';
        this.parentElement.style.alignItems = 'center';
        this.parentElement.style.justifyContent = 'center';
        const placeholder = document.createElement('span');
        placeholder.textContent = '👤';
        placeholder.style.fontSize = '4rem';
        placeholder.style.color = '#ffffff';
        placeholder.style.opacity = '0.6';
        this.parentElement.appendChild(placeholder);
      });

      // ---- THOUGHT BUBBLE TYPEWRITER ----
      const messages = [
        "🎄 Advance Merry Christmas! 🎅",
        "Earn cashback on every treat you buy! 💰",
        "Your balance is ready to use! ✨",
        "Buy Treats & Get Cashback! 🎁"
      ];
      let messageIndex = 0;
      let charIndex = 0;
      let isDeleting = false;
      const typedSpan = document.getElementById('typedText');
      let typingSpeed = 36;

      function typeEffect() {
        const currentMessage = messages[messageIndex];
        if (!isDeleting) {
          typedSpan.textContent = currentMessage.substring(0, charIndex + 1);
          charIndex++;
          if (charIndex === currentMessage.length) {
            setTimeout(() => { isDeleting = true; typeEffect(); }, 2800);
            return;
          }
          setTimeout(typeEffect, typingSpeed + Math.random() * 18);
        } else {
          typedSpan.textContent = currentMessage.substring(0, charIndex - 1);
          charIndex--;
          if (charIndex === 0) {
            isDeleting = false;
            messageIndex = (messageIndex + 1) % messages.length;
            setTimeout(typeEffect, 500);
            return;
          }
          setTimeout(typeEffect, typingSpeed * 0.3);
        }
      }
      setTimeout(typeEffect, 600);

      // ---- PROJECTOR ZOOM - TAP TOGGLE ----
      const photoWrapper = document.getElementById('photoWrapper');
      
      photoWrapper.addEventListener('click', function(e) {
        e.stopPropagation();
        this.classList.toggle('active');
      });

      document.addEventListener('click', function(e) {
        if (!photoWrapper.contains(e.target)) {
          photoWrapper.classList.remove('active');
        }
      });

      // ===== CARD DATA =====
      const cardData = {
        1: {
          img: 'photos/1500iva.png',
          badge: '₱1,500',
          discount: '-22%',
          oldPrice: '₱700',
          newPrice: '545',
          amount: 1500.00
        },
        2: {
          img: 'photos/3000iva.png',
          badge: '₱3,000',
          discount: '-28%',
          oldPrice: '₱1,500',
          newPrice: '1,080',
          amount: 3000.00
        }
      };

      // ===== POPUP LOGIC =====
      let popupCardNumber = null;
      const popupOverlay = document.getElementById('popupOverlay');
      const popupImage = document.getElementById('popupImage');
      const popupBadge = document.getElementById('popupBadge');
      const popupDiscount = document.getElementById('popupDiscount');
      const popupOldPrice = document.getElementById('popupOldPrice');
      const popupNewPrice = document.getElementById('popupNewPrice');
      const popupSelectBtn = document.getElementById('popupSelectBtn');

      window.openPopup = function(cardNumber) {
        popupCardNumber = cardNumber;
        const data = cardData[cardNumber];
        
        popupImage.src = data.img;
        popupBadge.textContent = data.badge;
        popupDiscount.textContent = data.discount;
        popupOldPrice.textContent = data.oldPrice;
        popupNewPrice.textContent = data.newPrice;
        
        // Update button state based on selection
        updatePopupButtonState();
        
        popupOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      };

      window.closePopup = function() {
        popupOverlay.classList.remove('active');
        document.body.style.overflow = '';
      };

      function updatePopupButtonState() {
        const cardId = 'card' + popupCardNumber;
        const card = document.getElementById(cardId);
        const isSelected = card.classList.contains('selected');
        
        if (isSelected) {
          popupSelectBtn.classList.add('selected-popup');
          popupSelectBtn.innerHTML = '<i class="fas fa-check-circle"></i> ✓ Selected';
        } else {
          popupSelectBtn.classList.remove('selected-popup');
          popupSelectBtn.innerHTML = '<i class="fas fa-check-circle"></i> Select Treat';
        }
      }

      window.popupSelectCard = function() {
        if (popupCardNumber) {
          selectCard(popupCardNumber);
          updatePopupButtonState();
        }
      };

      // ===== CARD SELECTION LOGIC =====
      let selectedCard = null;
      let currentBalance = 0;
      const balanceElement = document.getElementById('balanceAmount');

      function updateBalance(newAmount, isIncrement) {
        const amountSpan = balanceElement;
        amountSpan.classList.remove('increment', 'decrement');
        void amountSpan.offsetWidth;
        amountSpan.textContent = newAmount.toFixed(2);
        if (isIncrement) {
          amountSpan.classList.add('increment');
        } else {
          amountSpan.classList.add('decrement');
        }
        setTimeout(() => {
          amountSpan.classList.remove('increment', 'decrement');
        }, 700);
      }

      window.selectCard = function(cardNumber) {
        const card = document.getElementById('card' + cardNumber);
        const btn = card.querySelector('.card-btn');
        const amount = cardData[cardNumber].amount;
        const cardId = 'card' + cardNumber;

        if (selectedCard === cardId) {
          card.classList.remove('selected');
          btn.classList.remove('selected-btn');
          btn.textContent = 'Select Treat';
          selectedCard = null;
          currentBalance = 0;
          updateBalance(0, false);
          return;
        }

        if (selectedCard !== null) {
          const prevCard = document.getElementById(selectedCard);
          const prevBtn = prevCard.querySelector('.card-btn');
          prevCard.classList.remove('selected');
          prevBtn.classList.remove('selected-btn');
          prevBtn.textContent = 'Select Treat';
        }

        card.classList.add('selected');
        btn.classList.add('selected-btn');
        btn.textContent = '✓ Selected';
        selectedCard = cardId;
        currentBalance = amount;
        updateBalance(amount, true);
      };

      // ---- CLAIM NOW BUTTON ----
      document.getElementById('claimNowBtn').addEventListener('click', function() {
        if (currentBalance <= 0) {
          alert('💳 Please select a treat reward first!');
        } else {
          alert('💰 Claiming ₱' + currentBalance.toFixed(2) + ' thru GCash\n\n📱 Please wait 24-48 hours for processing.\n\nThank you for being a Buy Treats member!');
        }
      });

      // Close popup with Escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && popupOverlay.classList.contains('active')) {
          closePopup();
        }
      });

    })();
  </script>
</body>
</html>
