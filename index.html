<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>FreeShoppingPH</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #10b981;
      --primary-hover: #059669;
      --primary-light: rgba(16, 185, 129, 0.12);
      --background: #f1f5f9;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border-light: #e2e8f0;
      --shadow-sm: 0 4px 16px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 8px 30px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 20px 50px rgba(15, 23, 42, 0.10);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--background);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 1.2rem;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 50%);
    }

    /* ---- MAIN CARD ---- */
    .brand-card {
      max-width: 440px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 32px;
      box-shadow: var(--shadow-lg), 0 0 0 1px rgba(15, 23, 42, 0.03);
      padding: 2.4rem 1.8rem 2.6rem;
      position: relative;
      transition: all 0.2s ease;
    }

    /* ---- PROFILE SECTION (photo + thought bubble pointing to photo) ---- */
    .profile-section {
      display: flex;
      align-items: flex-start;
      gap: 1.2rem;
      margin-bottom: 2rem;
      position: relative;
    }

    /* Photo container with status dot */
    .profile-photo-container {
      position: relative;
      flex-shrink: 0;
      margin-top: 0.2rem;
    }

    .profile-photo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #ffffff;
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.18), 0 0 0 1px rgba(16, 185, 129, 0.06);
      background: #e8edf2;
      transition: transform 0.3s ease;
    }
    .profile-photo:hover {
      transform: scale(1.02);
    }

    .profile-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile-photo .fallback {
      display: none;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 2.5rem;
    }

    .status-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 14px;
      height: 14px;
      background: var(--primary);
      border: 2.5px solid #ffffff;
      border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.15);
    }

    /* Thought Bubble - with tail pointing to photo */
    .thought-bubble-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      min-height: 76px;
    }

    .thought-bubble {
      background: #f8fafc;
      border-radius: 18px 18px 18px 6px;
      padding: 1rem 1.2rem;
      width: 100%;
      min-height: 68px;
      display: flex;
      align-items: center;
      border: 1px solid var(--border-light);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.02);
      position: relative;
    }

    /* Bubble tail - points directly to the photo */
    .thought-bubble::before {
      content: '';
      position: absolute;
      left: -10px;
      top: 24px;
      width: 0;
      height: 0;
      border-right: 12px solid #f8fafc;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      filter: drop-shadow(-1px 0 1px rgba(0, 0, 0, 0.02));
    }

    /* Border on tail */
    .thought-bubble::after {
      content: '';
      position: absolute;
      left: -12px;
      top: 22px;
      width: 0;
      height: 0;
      border-right: 14px solid var(--border-light);
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      z-index: 0;
      opacity: 0.4;
    }

    .thought-bubble .message-content {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text-main);
      line-height: 1.5;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--primary);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ---- FORM GROUP ---- */
    .form-group {
      margin-bottom: 1.2rem;
    }

    .popup-label {
      font-weight: 700;
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      display: block;
    }

    .popup-input-group {
      display: flex;
      align-items: center;
      background: #f1f5f9;
      border-radius: 14px;
      padding: 0 1.2rem;
      border: 2px solid transparent;
      transition: all 0.25s ease;
    }

    .popup-input-group:focus-within {
      border-color: var(--primary);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.10);
    }

    .popup-input-group.invalid:focus-within {
      border-color: #ef4444;
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.08);
    }

    .popup-input-group.valid:focus-within {
      border-color: var(--primary);
    }

    .mobile-icon-prefix {
      color: var(--primary);
      font-size: 1.2rem;
      margin-right: 0.6rem;
      opacity: 0.8;
    }

    .popup-input-group input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 0.95rem 0;
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-main);
      outline: none;
      letter-spacing: 0.06em;
    }

    .popup-input-group input::placeholder {
      color: #94a3b8;
      font-weight: 500;
      letter-spacing: 0.04em;
      opacity: 0.6;
    }

    .status-icon {
      font-size: 1.15rem;
      color: #cbd5e1;
      transition: all 0.3s ease;
      margin-left: 0.5rem;
    }

    .valid .status-icon { color: var(--primary); }
    .invalid .status-icon { color: #ef4444; }

    .popup-hint {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.7;
    }
    .popup-hint i {
      font-size: 0.65rem;
    }

    /* ---- CTA BUTTON ---- */
    .cta-btn {
      width: 100%;
      background: linear-gradient(145deg, var(--primary), var(--primary-hover));
      border: none;
      border-radius: 14px;
      padding: 1.05rem 0.5rem;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.03em;
      color: #ffffff;
      box-shadow: 0 6px 20px rgba(16, 185, 129, 0.20);
      transition: all 0.2s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .cta-btn:hover {
      background: linear-gradient(145deg, var(--primary-hover), #047857);
      box-shadow: 0 8px 28px rgba(16, 185, 129, 0.30);
      transform: translateY(-1px);
    }

    .cta-btn:active {
      transform: scale(0.97);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
    }

    .cta-btn i {
      color: #fcd34d;
      font-size: 1.05rem;
    }

    /* ---- BRAND FOOTER ---- */
    .brand-footer {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      opacity: 0.5;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .brand-footer i {
      color: var(--primary);
      opacity: 0.6;
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 480px) {
      body { padding: 0.8rem; }
      .brand-card { padding: 1.6rem 1.2rem 2rem; border-radius: 24px; }
      
      .profile-photo { width: 64px; height: 64px; }
      .thought-bubble { padding: 0.8rem 1rem; min-height: 58px; }
      .thought-bubble .message-content { font-size: 0.82rem; }
      .thought-bubble::before { top: 20px; }
      .thought-bubble::after { top: 18px; }
      
      .popup-input-group input { font-size: 0.95rem; padding: 0.8rem 0; }
      .cta-btn { font-size: 0.92rem; padding: 0.9rem 0.5rem; }
      .mobile-icon-prefix { font-size: 1rem; }
    }

    @media (max-width: 380px) {
      .brand-card { padding: 1.2rem 0.9rem 1.6rem; }
      .profile-photo { width: 54px; height: 54px; }
      .thought-bubble .message-content { font-size: 0.75rem; }
      .thought-bubble { min-height: 50px; padding: 0.6rem 0.8rem; }
      .thought-bubble::before { top: 16px; border-right-width: 9px; border-top-width: 6px; border-bottom-width: 6px; }
      .thought-bubble::after { top: 14px; border-right-width: 11px; border-top-width: 8px; border-bottom-width: 8px; }
      .popup-input-group input { font-size: 0.85rem; padding: 0.7rem 0; }
      .mobile-icon-prefix { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <div class="brand-card">
    
    <!-- Profile Section: Photo + Thought Bubble (pointing to photo) -->
    <div class="profile-section">
      <div class="profile-photo-container">
        <div class="profile-photo">
          <img src="photos/iva.jpg" alt="FreeShoppingPH" id="brandImg" />
          <div class="fallback" id="fallbackIcon">
            <i class="fas fa-user-circle"></i>
          </div>
        </div>
        <div class="status-dot"></div>
      </div>

      <div class="thought-bubble-wrapper">
        <div class="thought-bubble">
          <div class="message-content">
            <span id="typedText"></span><span class="cursor"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Phone Input with Mobile Icon -->
    <div class="form-group">
      <label class="popup-label" for="popupMobileInput">
        <i class="fas fa-mobile-alt" style="margin-right: 6px;"></i> Mobile Number
      </label>
      <div class="popup-input-group" id="inputWrapper">
        <i class="fas fa-mobile-alt mobile-icon-prefix"></i>
        <input 
          type="tel" 
          id="popupMobileInput" 
          placeholder="09171234567" 
          maxlength="11" 
          inputmode="numeric" 
          pattern="[0-9]*" 
          autocomplete="off" 
          value="09"
        />
        <i class="fas fa-check-circle status-icon" id="statusIcon"></i>
      </div>
      <div class="popup-hint">
        <i class="fas fa-info-circle"></i> Mag-enter ng 11-digit number (Halimbawa: 09171234567)
      </div>
    </div>

    <button class="cta-btn" id="popupSubmitBtn">
      <i class="fas fa-unlock-alt"></i> CLAIM ACCESS
    </button>

    <div class="brand-footer">
      <i class="fas fa-shield-alt"></i> Secure · FreeShoppingPH
    </div>
  </div>

  <script>
    (function() {
      // ---- IMAGE FALLBACK ----
      const img = document.getElementById('brandImg');
      const fallback = document.getElementById('fallbackIcon');

      img.addEventListener('error', function() {
        this.style.display = 'none';
        fallback.style.display = 'flex';
      });

      // ---- TYPEWRITER EFFECT (thought bubble) ----
      const messages = [
        "Welcome to FreeShoppingPH 👋",
        "Manalo ng Cash Prizes by Answering Trivia Questions! 🏆",
        "Ilagay ang inyong mobile number at magpatuloy. 📱"
      ];
      let messageIndex = 0;
      let charIndex = 0;
      let isDeleting = false;
      const typedSpan = document.getElementById('typedText');
      let typingSpeed = 38;

      function typeEffect() {
        const currentMessage = messages[messageIndex];
        if (!isDeleting) {
          typedSpan.textContent = currentMessage.substring(0, charIndex + 1);
          charIndex++;
          if (charIndex === currentMessage.length) {
            setTimeout(() => { isDeleting = true; typeEffect(); }, 2800);
            return;
          }
          setTimeout(typeEffect, typingSpeed + Math.random() * 20);
        } else {
          typedSpan.textContent = currentMessage.substring(0, charIndex - 1);
          charIndex--;
          if (charIndex === 0) {
            isDeleting = false;
            messageIndex = (messageIndex + 1) % messages.length;
            setTimeout(typeEffect, 500);
            return;
          }
          setTimeout(typeEffect, typingSpeed * 0.35);
        }
      }
      setTimeout(typeEffect, 700);

      // ---- INPUT HANDLING & VALIDATION ----
      const mobileInput = document.getElementById('popupMobileInput');
      const inputWrapper = document.getElementById('inputWrapper');
      const statusIcon = document.getElementById('statusIcon');
      const submitBtn = document.getElementById('popupSubmitBtn');

      function validateInput() {
        const val = mobileInput.value;
        const digits = val.replace(/\D/g, '');
        if (digits.length === 11 && digits.startsWith('09')) {
          inputWrapper.classList.remove('invalid');
          inputWrapper.classList.add('valid');
          statusIcon.className = "fas fa-check-circle status-icon";
          return true;
        } else {
          inputWrapper.classList.remove('valid');
          if (digits.length >= 3) {
            inputWrapper.classList.add('invalid');
            statusIcon.className = "fas fa-times-circle status-icon";
          } else {
            inputWrapper.classList.remove('invalid');
            statusIcon.className = "fas fa-check-circle status-icon";
          }
          return false;
        }
      }

      mobileInput.addEventListener('input', function() {
        let digits = this.value.replace(/\D/g, '');
        if (digits === '') {
          this.value = '09';
          validateInput();
          return;
        }
        if (!digits.startsWith('09')) {
          digits = '09' + digits.replace(/^0+/, '');
        }
        if (digits.length > 11) digits = digits.slice(0, 11);
        this.value = digits;
        validateInput();
      });

      mobileInput.addEventListener('blur', function() {
        let val = this.value.replace(/\D/g, '');
        if (val === '') { this.value = '09'; return; }
        if (!val.startsWith('09')) val = '09' + val.slice(2);
        if (val.length > 11) val = val.slice(0, 11);
        this.value = val;
        validateInput();
      });

      mobileInput.addEventListener('keydown', function(e) {
        if (['Backspace', 'Delete', 'ArrowLeft', 'ArrowRight', 'Tab'].includes(e.key)) return;
        if (e.key === 'Escape') { this.value = '09'; validateInput(); return; }
        if (!/^[0-9]$/.test(e.key)) e.preventDefault();
      });

      // ---- REDIRECT TO main.html ON SUCCESS ----
      function handleSubmit() {
        const val = mobileInput.value.replace(/\D/g, '');
        if (val.length === 11 && val.startsWith('09')) {
          // Redirect to main.html
          window.location.href = 'main.html';
        } else {
          inputWrapper.classList.add('invalid');
          statusIcon.className = "fas fa-times-circle status-icon";
          mobileInput.focus();
          if (val.length < 11) {
            alert('❗ Kailangan ng 11-digit number na nagsisimula sa 09.');
          } else {
            alert('❗ Dapat magsimula sa "09" ang number.');
          }
        }
      }

      submitBtn.addEventListener('click', function(e) {
        e.preventDefault();
        handleSubmit();
        this.style.transform = 'scale(0.96)';
        setTimeout(() => this.style.transform = '', 120);
      });

      mobileInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); handleSubmit(); }
      });

      // Initial validation
      validateInput();
    })();
  </script>

</body>
</html>
